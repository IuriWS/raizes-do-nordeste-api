services:
  api:
    build: .
    container_name: raizes_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/raizes_do_nordeste?schema=public"
      JWT_SECRET: "dev-secret"
      JWT_EXPIRES_IN: "1d"
      PORT: "3000"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  postgres:
    image: postgres:16-alpine
    container_name: raizes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raizes_do_nordeste
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raizes_do_nordeste"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
